<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Für Jess ❤️</title>
  <style>
    body {
      margin: 0;
      background: #b3e5fc;
      overflow: hidden;
      font-family: Arial, sans-serif;
      text-align: center;
      position: relative;
      height: 100vh;
    }

    h1 {
      color: white;
      margin-top: 30px;
      font-size: 50px;
    }

    /* Otter-Emojis */
    .otter {
      position: absolute;
      font-size: 80px;
      cursor: pointer;
      user-select: none;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }

    /* Liebesnachricht */
    #message {
      display: none;
      font-size: 42px;
      color: #ff4d6d;
      margin-top: 80px;
    }

    /* Herzregen */
    .heart {
      position: absolute;
      color: red;
      font-size: 24px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(100vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>Klicke alle Otter 🦦</h1>

  <!-- 2 Otter Emojis -->
  <div class="otter" style="top:80px; left:100px;" onclick="clickOtter(this)">🦦</div>
  <div class="otter" style="top:200px; left:300px;" onclick="clickOtter(this)">🦦</div>

  <div id="message">Jess ich liebe dich über alles! ❤️❤️❤️</div>

  <script>
    let count = 0;

    function clickOtter(otter) {
      // Otter verschwinden beim Klick
      otter.style.display = 'none';

      // Herz-Explosion beim Klick
      for (let i = 0; i < 2; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = otter.offsetLeft + "px";
        heart.style.top = otter.offsetTop + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }

      count++;
      if (count === 2) {
        document.getElementById("message").style.display = "block";
        // Hintergrund rosa + Herzregen
        document.body.style.background = "#ffc0cb";
        heartRain();
      }
    }

    function heartRain() {
      setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = "-20px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }, 200);
    }
  </script>

</body>
</html>
